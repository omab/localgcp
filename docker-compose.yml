services:
  localgcp:
    image: omab/localgcp:latest
    build: .
    container_name: localgcp
    ports:
      - "4443:4443"   # Cloud Storage
      - "8080:8080"   # Firestore
      - "8085:8085"   # Pub/Sub gRPC  (PUBSUB_EMULATOR_HOST)
      - "8086:8086"   # Pub/Sub REST
      - "8090:8090"   # Secret Manager
      - "8123:8123"   # Cloud Tasks
      - "9050:9050"   # BigQuery
      - "9010:9010"   # Cloud Spanner
      - "9020:9020"   # Cloud Logging
      - "8091:8091"   # Cloud Scheduler
      - "8888:8888"   # Admin UI
    environment:
      - LOCALGCP_PROJECT=local-project
      - LOCALGCP_LOCATION=us-central1
      - LOCALGCP_DATA_DIR=/data
    volumes:
      - localgcp-data:/data
    restart: unless-stopped

volumes:
  localgcp-data:
